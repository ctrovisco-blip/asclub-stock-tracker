<!doctype html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ASClub Stock counter</title>
<link rel="icon" type="image/png" href="https://framerusercontent.com/images/tM8HHQk9OHFkyh0ioYZs2csko.png?width=64&amp;height=64" />
<style>
  :root {
    color-scheme: dark;
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e8eaed;
    --muted: #8b93a3;
    --accent: #5b8def;
    --green: #3ecf8e;
    --red: #ef5b5b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px 16px 64px;
  }
  .wrap { max-width: 960px; margin: 0 auto; }
  header { margin-bottom: 24px; }
  header.header-bar { display: flex; align-items: center; gap: 14px; }
  header .logo { width: 48px; height: 48px; object-fit: contain; flex-shrink: 0; }
  header h1 { font-size: 1.5rem; margin: 0 0 4px; }
  header p { color: var(--muted); margin: 0; font-size: 0.9rem; }

  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; margin-bottom: 28px; }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
  }
  .card .ticker { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .card .name { font-size: 1.1rem; font-weight: 600; margin: 2px 0 12px; }
  .card .row { display: flex; justify-content: space-between; font-size: 0.9rem; padding: 4px 0; color: var(--muted); }
  .card .row strong { color: var(--text); font-weight: 600; }
  .card .price { font-size: 1.3rem; font-weight: 700; margin-top: 8px; }
  .card .price small { font-size: 0.75rem; color: var(--muted); font-weight: 400; }

  section { margin-bottom: 28px; }
  h2 { font-size: 1.1rem; margin: 0 0 12px; }

  form.purchase {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    display: grid;
    grid-template-columns: 1.2fr 1fr 0.8fr auto;
    gap: 10px;
    align-items: end;
  }
  form.purchase label { display: block; font-size: 0.75rem; color: var(--muted); margin-bottom: 4px; }
  form.purchase input, form.purchase select {
    width: 100%;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 9px 10px;
    font-size: 0.9rem;
  }
  form.purchase button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
  }
  form.purchase button:hover { filter: brightness(1.1); }
  form.purchase button:disabled { opacity: 0.6; cursor: default; }
  .form-msg { grid-column: 1 / -1; font-size: 0.85rem; min-height: 1.2em; }
  .form-msg.error { color: var(--red); }
  .form-msg.ok { color: var(--green); }

  .search { margin-bottom: 10px; }
  .search input {
    width: 100%;
    max-width: 320px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 0.85rem;
  }

  .table-scroll { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
  table { width: 100%; min-width: 480px; border-collapse: collapse; background: var(--panel); }
  th, td { text-align: left; padding: 10px 14px; font-size: 0.88rem; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { color: var(--muted); font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.04em; }
  tr:last-child td { border-bottom: none; }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  .rank { color: var(--muted); width: 24px; }
  tr.hidden { display: none; }

  .feed { display: flex; flex-direction: column; gap: 8px; max-height: 260px; overflow-y: auto; }
  .feed-item {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 0.85rem;
    display: flex;
    justify-content: space-between;
    color: var(--muted);
  }
  .feed-item strong { color: var(--text); }
  .feed-item time { font-size: 0.75rem; white-space: nowrap; }

  footer { color: var(--muted); font-size: 0.75rem; text-align: center; margin-top: 40px; }

  @media (max-width: 620px) {
    body { padding: 16px 12px 48px; }
    header.header-bar { gap: 10px; }
    header .logo { width: 36px; height: 36px; }
    header h1 { font-size: 1.25rem; }
    header p { font-size: 0.82rem; }
    .cards { gap: 12px; }
    .card { padding: 14px 16px; }
    form.purchase { grid-template-columns: 1fr; padding: 14px 16px; }
    .search input { max-width: none; }
    th, td { padding: 8px 10px; font-size: 0.82rem; }
    .feed-item { flex-direction: column; align-items: flex-start; gap: 2px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="header-bar">
    <img class="logo" src="https://framerusercontent.com/images/tM8HHQk9OHFkyh0ioYZs2csko.png?width=200&amp;height=200" alt="ASClub" />
    <div>
      <h1>ASClub Stock counter</h1>
      <p>Contador partilhado de ações da comunidade — VICI Properties e Realty Income. Insere as tuas compras abaixo.</p>
    </div>
  </header>

  <div class="cards" id="company-cards"></div>

  <section>
    <h2>Registar compra</h2>
    <form class="purchase" id="purchase-form">
      <div>
        <label for="nick">Nick do Discord</label>
        <input type="text" id="nick" maxlength="60" required placeholder="ex: investidor123" />
      </div>
      <div>
        <label for="ticker">Empresa</label>
        <select id="ticker" required>
          <option value="VICI">VICI Properties (VICI)</option>
          <option value="O">Realty Income (O)</option>
          <option value="MAIN">Main Street Capital (MAIN)</option>
        </select>
      </div>
      <div>
        <label for="shares">Nº de ações</label>
        <input type="number" id="shares" min="0.0001" step="any" required placeholder="10" />
      </div>
      <button type="submit" id="submit-btn">Adicionar</button>
      <div class="form-msg" id="form-msg"></div>
    </form>
  </section>

  <section>
    <h2>Ranking por investidor</h2>
    <div class="search">
      <input type="text" id="search-nick" placeholder="Procurar por nick..." />
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th class="rank">#</th>
            <th>Nick</th>
            <th class="num">VICI</th>
            <th class="num">O</th>
            <th class="num">MAIN</th>
            <th class="num">Valor total</th>
          </tr>
        </thead>
        <tbody id="ranking-body"></tbody>
      </table>
    </div>
  </section>

  <section>
    <h2>Atividade recente</h2>
    <div class="feed" id="feed"></div>
  </section>

  <footer id="last-update">A carregar...</footer>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://sezorvujawqimeagxxje.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNlem9ydnVqYXdxaW1lYWd4eGplIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1MjA3NTAsImV4cCI6MjA5OTA5Njc1MH0.6SUmqGx-D7_TOHPrH2z9bluJe5FwdSlxSSbG1m6K7k8';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const COMPANIES = {
  VICI: { name: 'VICI Properties' },
  O: { name: 'Realty Income' },
  MAIN: { name: 'Main Street Capital' },
};

let holdings = [];
let quotes = {};
let searchTerm = '';

const currencyFmt = new Intl.NumberFormat('pt-PT', { style: 'currency', currency: 'USD' });
const sharesFmt = new Intl.NumberFormat('pt-PT', { maximumFractionDigits: 4 });

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, (c) => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
  }[c]));
}

async function loadHoldings() {
  const { data, error } = await supabase
    .from('holdings')
    .select('*')
    .order('created_at', { ascending: false });
  if (error) { console.error('loadHoldings', error); return; }
  holdings = data ?? [];
  render();
}

async function loadQuotes() {
  const { data, error } = await supabase.functions.invoke('get-quotes');
  if (error) { console.error('loadQuotes', error); return; }
  quotes = data?.quotes ?? {};
  document.getElementById('last-update').textContent =
    'Cotações atualizadas: ' + new Date(data?.fetchedAt ?? Date.now()).toLocaleString('pt-PT');
  render();
}

function priceFor(ticker) {
  const q = quotes[ticker];
  return q && typeof q.price === 'number' ? q.price : null;
}

function renderCompanyCards() {
  const el = document.getElementById('company-cards');
  el.innerHTML = Object.entries(COMPANIES).map(([ticker, info]) => {
    const rows = holdings.filter((h) => h.ticker === ticker);
    const totalShares = rows.reduce((sum, h) => sum + Number(h.shares), 0);
    const investors = new Set(rows.map((h) => h.nick.toLowerCase())).size;
    const price = priceFor(ticker);
    const totalValue = price !== null ? totalShares * price : null;
    return `
      <div class="card">
        <div class="ticker">${ticker}</div>
        <div class="name">${escapeHtml(info.name)}</div>
        <div class="price">${price !== null ? currencyFmt.format(price) : '—'} <small>/ ação</small></div>
        <div class="row"><span>Total de ações</span><strong>${sharesFmt.format(totalShares)}</strong></div>
        <div class="row"><span>Valor total</span><strong>${totalValue !== null ? currencyFmt.format(totalValue) : '—'}</strong></div>
        <div class="row"><span>Investidores</span><strong>${investors}</strong></div>
      </div>`;
  }).join('');
}

function renderRanking() {
  const tickers = Object.keys(COMPANIES);
  const byNick = new Map();
  for (const h of holdings) {
    const key = h.nick;
    if (!byNick.has(key)) {
      const empty = Object.fromEntries(tickers.map((t) => [t, 0]));
      byNick.set(key, { nick: h.nick, ...empty });
    }
    byNick.get(key)[h.ticker] += Number(h.shares);
  }

  const rows = [...byNick.values()].map((r) => {
    const value = tickers.reduce((sum, t) => {
      const price = priceFor(t);
      return sum + (price !== null ? r[t] * price : 0);
    }, 0);
    return { ...r, value };
  }).sort((a, b) => b.value - a.value);

  const body = document.getElementById('ranking-body');
  const term = searchTerm.trim().toLowerCase();
  body.innerHTML = rows.map((r, i) => {
    const match = !term || r.nick.toLowerCase().includes(term);
    const tickerCells = tickers.map((t) => `<td class="num">${r[t] ? sharesFmt.format(r[t]) : '—'}</td>`).join('');
    return `
      <tr class="${match ? '' : 'hidden'}">
        <td class="rank">${i + 1}</td>
        <td>${escapeHtml(r.nick)}</td>
        ${tickerCells}
        <td class="num">${currencyFmt.format(r.value)}</td>
      </tr>`;
  }).join('') || `<tr><td colspan="${tickers.length + 3}" style="color:var(--muted)">Ainda não há compras registadas.</td></tr>`;
}

function renderFeed() {
  const feed = document.getElementById('feed');
  const recent = holdings.slice(0, 15);
  feed.innerHTML = recent.map((h) => `
    <div class="feed-item">
      <span><strong>${escapeHtml(h.nick)}</strong> comprou ${sharesFmt.format(Number(h.shares))} de ${escapeHtml(h.ticker)}</span>
      <time>${new Date(h.created_at).toLocaleString('pt-PT')}</time>
    </div>`).join('') || '<div class="feed-item">Sem atividade ainda.</div>';
}

function render() {
  renderCompanyCards();
  renderRanking();
  renderFeed();
}

document.getElementById('search-nick').addEventListener('input', (e) => {
  searchTerm = e.target.value;
  renderRanking();
});

const form = document.getElementById('purchase-form');
const submitBtn = document.getElementById('submit-btn');
const formMsg = document.getElementById('form-msg');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  formMsg.textContent = '';
  formMsg.className = 'form-msg';

  const nick = document.getElementById('nick').value.trim();
  const ticker = document.getElementById('ticker').value;
  const shares = parseFloat(document.getElementById('shares').value);

  if (!nick || !ticker || !shares || shares <= 0) {
    formMsg.textContent = 'Preenche todos os campos com valores válidos.';
    formMsg.className = 'form-msg error';
    return;
  }

  submitBtn.disabled = true;
  const { error } = await supabase.from('holdings').insert({ nick, ticker, shares });
  submitBtn.disabled = false;

  if (error) {
    formMsg.textContent = 'Erro ao registar: ' + error.message;
    formMsg.className = 'form-msg error';
    return;
  }

  formMsg.textContent = 'Compra registada!';
  formMsg.className = 'form-msg ok';
  form.reset();
});

supabase
  .channel('holdings-changes')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'holdings' }, (payload) => {
    holdings.unshift(payload.new);
    render();
  })
  .subscribe();

loadHoldings();
loadQuotes();
setInterval(loadQuotes, 60000);
</script>
</body>
</html>
